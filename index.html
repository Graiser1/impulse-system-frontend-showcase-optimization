<!DOCTYPE html>
<meta charset="utf-8">

<head>
    <link rel="stylesheet" href="./styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>


<!-- Load d3.js -->
<script src="./d3.v7.js"></script>
<body id="body">
<header>
    <div id="top-menu">
        <div id="statusContainer">
            <span class="status-label">Режим</span>
            <span id="status" class="status-value">status</span>
        </div>
        <button id="returnEditNetworkButton">задать программу управления</button>
        <button id="controlProgramButton">поиск программы управления</button>
        <div id="network-edit-menu">
            <button id="addNewNodeButton">
                Добавить вершину
            </button>
            <button id="addNewLinkButton">
                Добавить ребро
            </button>
            <button id="editNodeButton">
                Редактировать элемент
            </button>

            <div class="slidecontainer" style="align-self: center; text-align: center">
                <label for="rangeSlider">радиус вершин</label>
                <input id="rangeSlider" type="range" min="1" max="100" value="50" class="slider">
            </div>

            <label class="layout-lock-control" title="Вершины остаются на местах, но их можно перетаскивать вручную">
                <input id="layoutLockCheckbox" type="checkbox" checked>
                фиксировать
            </label>

            <button id="submitBuiltNetworkButton">
                Закончить построение графа
            </button>
            <a href="graphic.html" class="goToLink">
                <button id="goTo">
                    submit built network & create graphic
                </button>
            </a>
        </div>
        <div id="userTopMenu">
            <button id="loginButton" style="visibility: hidden;">войти</button>
            <button id="registerButton" style="visibility: hidden;">зарегистрироваться</button>
            <button id="load_button">загрузить из файла</button>
            <button id="save_button">сохранить в файл</button>
            <!-- Скрытый input для выбора файла -->
            <input type="file" id="fileInput" accept=".json" style="display: none;" />
            <div id="userTopMenuSelect">
                <select id="networkSelect"></select>
                <button id="openSelectedNetworkButton">открыть этот граф</button>
            </div>
            <div id="userTopMenuSave">
                <div id="networkNameInputContainer"><label for="networkNameInput">имя графа</label>
                    <input id="networkNameInput" type="text"></div>
                <button id="networkSaveButton">сохранить этот граф</button>
            </div>
        </div>

    </div>
</header>
<div class="main" id="main">
    <button style="position: absolute" id="testButton">
        <br>
        <br>

        <br>
        <br>
        <br>
        test button
    </button>
    <div id="container"></div>
    <div id="impulseChartContainer"></div>
    <div class="impulseEditor" id="impulseEditor">
        <div class="impulseEditor-header">
            <span id="totalImpulseStepsSpan">Количество шагов: </span>
            <input id="impulseStepsInput" type="number" min="0" value="0" title="Количество шагов">
            <button id="impulseSubmitButton">закончить ввод импульсов</button>
            <div id="impulseForNodeContainer">
                <button id="impulseAddNodeButton">добавить импульс к:</button>

                <br>
                <select style="width: 100%;" id="nodeForImpulseSelect"></select>
            </div>
            <div id="doImpuleStepContainer">
                <div class="chart-range-control">
                    <label for="chartStepFromInput">с</label>
                    <input id="chartStepFromInput" type="number" min="1" value="1" title="Первый шаг на графике">
                    <label for="chartStepToInput">по</label>
                    <input id="chartStepToInput" type="number" min="1" value="10" title="Последний шаг на графике">
                </div>
                <button id="doImpulseStepButton">выполнить шаг</button>
                <button id="doAllImpulseStepsButton">выполнить все</button>
                <br>
                <span id="impulseStepSpan">номер текущего шага: 0</span>
            </div>
        </div>
        <div id="impulseInputContainer"></div>
        <div id="controlProgramResult" class="control-program-result"></div>
    </div>
</div>

<div class="form-popup control-program-popup" id="controlProgramForm">
    <form action="/action_page.php" class="form-container control-program-container">
        <h1>Поиск программы управления</h1>

        <div class="control-program-row">
            <label><b>Отрезок динамики цели</b></label>
            <div class="control-program-step-range">
                <span>с</span>
                <input id="targetDynamicFromStepInput" type="number" min="1" value="1">
                <span>по</span>
                <input id="targetDynamicToStepInput" type="number" min="1" value="10">
            </div>
        </div>

        <label><b>Целевые вершины</b></label>
        <div id="controlTargetList" class="control-program-list"></div>

        <label><b>Ресурсные вершины и шаги управления</b></label>
        <div id="controlResourceList" class="control-program-list"></div>

        <label class="control-program-manual-toggle">
            <input id="controlProgramManualModeInput" type="checkbox">
            <span>Ручной ввод импульсов</span>
        </label>

        <span id="controlProgramStatus" class="control-program-status"></span>

        <div class="control-program-actions">
            <button id="applyControlProgramButton" type="button" class="btn">Подставить</button>
            <button id="controlProgramCloseButton" type="button" class="btn cancel">Закрыть</button>
        </div>
    </form>
</div>

<div class="form-popup control-acceptance-popup" id="controlAcceptanceForm">
    <form action="/action_page.php" class="form-container control-acceptance-container">
        <h1>Принятие программы</h1>
        <div id="controlAcceptanceStatus" class="control-acceptance-status"></div>
        <div id="controlAcceptanceDetails" class="control-acceptance-details"></div>
        <div class="control-acceptance-actions">
            <button id="controlAcceptanceAcceptButton" type="button" class="btn">Принять</button>
            <button id="controlAcceptanceRejectButton" type="button" class="btn cancel">Не принять</button>
            <button id="controlAcceptanceSaveFileButton" type="button" class="btn control-acceptance-after-accept">Сохранить в файл</button>
            <button id="controlAcceptanceSaveImageButton" type="button" class="btn control-acceptance-after-accept">Сохранить как изображение</button>
            <button id="controlAcceptanceRecalculateButton" type="button" class="btn control-acceptance-after-reject">Перерасчет</button>
            <button id="controlAcceptanceCloseButton" type="button" class="btn cancel control-acceptance-after-decision">Выйти</button>
        </div>
    </form>
</div>

<!-- The form -->
<div class="form-popup" id="myForm">
    <form action="/action_page.php" class="form-container">
        <h1>Edit node</h1>

        <label for="editNodeNameInput"><b>Node name</b></label>
        <input id="editNodeNameInput" type="text" placeholder="Enter node name" name="nodeName" required>

        <label for="editNodeValueInput"><b>Node value</b></label>
        <input id="editNodeValueInput" type="number" placeholder="Enter node value" name="nodeValue" required>

        <label for="editNodeRoleSelect"><b>Node role</b></label>
        <select id="editNodeRoleSelect" name="nodeRole">
            <option value="other">Обычная</option>
            <option value="target">Целевая</option>
            <option value="resource">Ресурсная</option>
        </select>

        <button id="submitEditNodeButton" type="button" class="btn">Submit</button>
        <button id="deleteNodeButton" type="button" class="btn">Delete</button>
        <button id="editNodeCloseButton" type="button" class="btn cancel">Close</button>
    </form>
</div>

<!-- Edit link form -->
<div class="form-popup" id="linkForm" style="display: none">
    <form action="/action_page.php" class="form-container">
        <h1>Edit link</h1>

        <label for="editLinkNameInput"><b>Link name</b></label>
        <input id="editLinkNameInput" type="text" placeholder="Enter node name" name="nodeName" required>

        <label for="editLinkValueInput"><b>Link value</b></label>
        <input id="editLinkValueInput" type="number" placeholder="Enter node value" name="nodeValue" required>

        <button id="submitEditLinkButton" type="button" class="btn">Submit</button>
        <button id="deleteLinkButton" type="button" class="btn">Delete</button>
        <button id="editLinkCloseButton" type="button" class="btn cancel">Close</button>
    </form>
</div>

<!-- The Login Form -->
<div class="form-popup" id="LoginForm">
    <form action="/action_page.php" class="form-container">
        <h1>Login</h1>

        <span id="loginFormStatus"></span> <br>

        <label for="signInLoginInput"><b>Login</b></label>
        <input id="signInLoginInput" type="text" placeholder="Enter login" name="signInUserLogin" required>

        <label for="signInPasswordInput"><b>Password</b></label>
        <input id="signInPasswordInput" type="password" placeholder="Enter password" name="signInUserPassword" required>

        <button id="submitLoginButton" type="button" class="btn">Submit</button>
    </form>
</div>

<!-- The Register Form -->
<div class="form-popup" id="RegisterForm">
    <form action="/action_page.php" class="form-container">
        <h1>Register</h1>

        <span id="registerFormStatus"></span> <br>

        <label for="signUpLoginInput"><b>Login</b></label>
        <input id="signUpLoginInput" type="text" placeholder="Enter login" name="signUpUserLogin" required>

        <label for="signUpPasswordInput"><b>Password</b></label>
        <input id="signUpPasswordInput" type="password" placeholder="Enter password" name="signUpUserPassword" required>

        <button id="submitRegisterButton" type="button" class="btn">Submit</button>
    </form>
</div>

    <script type="module" src="./createScript.js"></script>
</body>
